<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plexus">
  <!-- Flattened from app/src/assets/plexus-logo.svg: var() colors substituted with
       literal hex (bg #0f1117, edges/nodes #C8C8D2, accent #c792ea) so rasterizers
       and favicons render reliably. Same geometry. -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0f1117"/>
  <g stroke="#C8C8D2" stroke-width="9" stroke-linecap="round">
    <line x1="140" y1="256" x2="248" y2="172"/>
    <line x1="140" y1="256" x2="248" y2="256"/>
    <line x1="140" y1="256" x2="248" y2="340"/>
    <line x1="248" y1="172" x2="356" y2="256"/>
    <line x1="248" y1="256" x2="356" y2="256"/>
    <line x1="248" y1="340" x2="356" y2="256"/>
  </g>
  <circle cx="140" cy="256" r="24" fill="#C8C8D2"/>
  <circle cx="248" cy="172" r="24" fill="#C8C8D2"/>
  <circle cx="248" cy="256" r="24" fill="#C8C8D2"/>
  <circle cx="248" cy="340" r="24" fill="#C8C8D2"/>
  <circle cx="356" cy="256" r="36" fill="#c792ea"/>
</svg>
